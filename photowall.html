<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photowall — ddddddot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0a0a0a;
      --surface: #141414;
      --border:  #2a2a2a;
      --text:    #c8c8c8;
      --dim:     #555;
      --accent:  #d4ff00;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 12px;
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 16px;
    }

    .logo {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--accent);
      text-decoration: none;
    }

    .header-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text);
    }

    .header-count {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.5px;
    }

    a.back-link {
      font-size: 11px;
      color: var(--dim);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border: 1px solid var(--border);
      padding: 5px 10px;
      border-radius: 3px;
      transition: border-color 0.1s, color 0.1s;
    }
    a.back-link:hover { border-color: #555; color: var(--text); }

    /* ── Grid ──────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }

    .card:hover {
      border-color: #555;
      transform: translateY(-2px);
    }

    .card img {
      display: block;
      width: 100%;
      height: auto;
    }

    .card-meta {
      padding: 8px 10px;
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── Empty state ───────────────────────────────── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
      padding: 40px;
      text-align: center;
    }

    .empty-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -2px;
      color: var(--border);
    }

    .empty p {
      color: var(--dim);
      font-size: 12px;
      line-height: 1.8;
    }

    .empty a {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 20px;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-decoration: none;
      border-radius: 3px;
      font-size: 11px;
    }

    .empty a:hover { background: #c4ef00; }

    /* ── Lightbox ──────────────────────────────────── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      padding: 24px;
    }

    .lightbox.open { display: flex; }

    .lightbox-inner {
      position: relative;
      max-width: min(960px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .lightbox img {
      max-width: 100%;
      max-height: 80vh;
      display: block;
      border-radius: 2px;
      box-shadow: 0 12px 60px rgba(0,0,0,0.7);
    }

    .lightbox-btns {
      display: flex;
      gap: 10px;
    }

    .lb-btn {
      appearance: none;
      border: 1px solid #444;
      background: transparent;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 18px;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.1s, border-color 0.1s;
    }

    .lb-btn:hover { background: #222; border-color: #666; }

    .lb-btn.accent {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    .lb-btn.accent:hover { background: #c4ef00; }

    .lb-close {
      position: absolute;
      top: -36px;
      right: 0;
      appearance: none;
      background: none;
      border: none;
      color: var(--dim);
      font-size: 18px;
      cursor: pointer;
      font-family: inherit;
      padding: 4px 8px;
      transition: color 0.1s;
    }

    .lb-close:hover { color: var(--text); }

    .lb-date {
      font-size: 10px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo">ddddddot</a>
    <span class="header-title">Photowall</span>
    <div style="display:flex;align-items:center;gap:16px">
      <span class="header-count" id="count"></span>
      <a href="index.html" class="back-link">← Booth</a>
    </div>
  </header>

  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" style="display:none">
    <div class="empty-title">ddddddot</div>
    <p>Your photowall is empty.<br>Take some photobooth strips first.</p>
    <a href="index.html">Open the booth →</a>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-inner">
      <button class="lb-close" id="lb-close">✕</button>
      <img id="lb-img" src="" alt="">
      <div class="lb-date" id="lb-date"></div>
      <div class="lightbox-btns">
        <button class="lb-btn accent" id="lb-dl">↓ Download</button>
        <button class="lb-btn" id="lb-del">Delete</button>
        <button class="lb-btn" id="lb-close2">Close</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'ddddddot_wall';
    let wall = [];
    let activeIdx = -1;

    function load() {
      try {
        wall = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch (e) { wall = []; }

      const grid  = document.getElementById('grid');
      const empty = document.getElementById('empty');
      const count = document.getElementById('count');

      count.textContent = wall.length + ' strip' + (wall.length !== 1 ? 's' : '');

      if (wall.length === 0) {
        empty.style.display = '';
        return;
      }

      empty.style.display = 'none';
      grid.innerHTML = '';

      wall.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        const date = new Date(item.ts).toLocaleString(undefined, {
          dateStyle: 'medium', timeStyle: 'short'
        });
        card.innerHTML = `<img src="${item.dataUrl}" loading="lazy" alt="Photobooth strip ${i+1}">
                          <div class="card-meta">${date}</div>`;
        card.addEventListener('click', () => openLightbox(i));
        grid.appendChild(card);
      });
    }

    function openLightbox(idx) {
      activeIdx = idx;
      const item = wall[idx];
      document.getElementById('lb-img').src = item.dataUrl;
      document.getElementById('lb-date').textContent =
        new Date(item.ts).toLocaleString(undefined, { dateStyle: 'long', timeStyle: 'short' });
      document.getElementById('lightbox').classList.add('open');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      activeIdx = -1;
    }

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-close2').addEventListener('click', closeLightbox);

    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });

    document.getElementById('lb-dl').addEventListener('click', () => {
      if (activeIdx < 0) return;
      const a = document.createElement('a');
      a.download = `ddddddot_strip_${wall[activeIdx].ts}.jpg`;
      a.href = wall[activeIdx].dataUrl;
      a.click();
    });

    document.getElementById('lb-del').addEventListener('click', () => {
      if (activeIdx < 0) return;
      if (!confirm('Remove this strip from your photowall?')) return;
      wall.splice(activeIdx, 1);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(wall));
      closeLightbox();
      load();
    });

    load();
  </script>
</body>
</html>
